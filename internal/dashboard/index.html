<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>erg orchestrator dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #141416;
    --bg-card: #1e1e21;
    --bg-card-hover: #242428;
    --bg-sidebar: #0f0f11;
    --bg-code: #1a1a1d;
    --accent: #f97316;
    --accent-dim: #ea580c;
    --accent-bg: rgba(249, 115, 22, 0.08);
    --accent-border: rgba(249, 115, 22, 0.2);
    --cyan: #22d3ee;
    --green: #34d399;
    --violet: #a78bfa;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e4e4e7;
    --text-muted: #a1a1aa;
    --text-dim: #71717a;
    --border: #2a2a2e;
    --radius: 8px;
    --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
    --font-display: 'Bricolage Grotesque', sans-serif;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-sidebar);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .header h1 {
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header h1 span {
    color: var(--accent);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }
  .auth-info {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .connection-status {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }
  .status-dot.disconnected {
    background: var(--red);
  }

  /* Main container */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 2rem;
  }

  /* Summary bar */
  .summary-bar {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .summary-stat {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1.25rem;
    min-width: 140px;
  }
  .summary-stat .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 0.25rem;
  }
  .summary-stat .value {
    font-family: var(--font-mono);
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--text);
  }
  .summary-stat .value.accent { color: var(--accent); }
  .summary-stat .value.green { color: var(--green); }
  .summary-stat .value.cyan { color: var(--cyan); }
  .summary-stat .value.yellow { color: var(--yellow); }
  .summary-stat .value.red { color: var(--red); }

  /* Needs Attention section */
  .needs-attention-section {
    margin-bottom: 1rem;
  }
  .needs-attention-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-family: var(--font-mono);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--yellow);
    padding: 0.4rem 0.75rem;
    background: rgba(251, 191, 36, 0.06);
    border: 1px solid rgba(251, 191, 36, 0.15);
    border-left: 3px solid var(--yellow);
    border-radius: var(--radius);
    margin-bottom: 0.75rem;
  }

  /* Daemon sections */
  .daemon-section {
    margin-bottom: 2rem;
  }
  .daemon-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .daemon-header h2 {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .daemon-meta {
    display: flex;
    gap: 1rem;
    font-size: 0.75rem;
    font-family: var(--font-mono);
    color: var(--text-dim);
  }

  /* Work items grid */
  .work-items {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 0.75rem;
  }

  /* Work item card */
  .work-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  .work-item:hover {
    border-color: var(--accent-border);
    background: var(--bg-card-hover);
  }
  .work-item.expanded {
    grid-column: 1 / -1;
  }
  .work-item.state-active {
    border-left: 3px solid var(--accent);
  }
  .work-item.state-completed {
    border-left: 3px solid var(--green);
    opacity: 0.7;
  }
  .work-item.state-failed {
    border-left: 3px solid var(--red);
  }
  .work-item.state-queued {
    border-left: 3px solid var(--text-dim);
    opacity: 0.6;
  }
  .work-item.state-awaiting {
    border-left: 3px solid var(--yellow);
  }

  .item-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .item-title {
    font-weight: 600;
    font-size: 0.875rem;
    color: var(--text);
    line-height: 1.3;
  }
  .item-title a {
    color: var(--text);
    text-decoration: none;
  }
  .item-title a:hover {
    color: var(--accent);
  }
  .item-state-badge {
    font-size: 0.65rem;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 0.5rem;
  }
  .item-state-badge.active {
    background: var(--accent-bg);
    color: var(--accent);
    border: 1px solid var(--accent-border);
  }
  .item-state-badge.completed {
    background: rgba(52, 211, 153, 0.08);
    color: var(--green);
    border: 1px solid rgba(52, 211, 153, 0.2);
  }
  .item-state-badge.failed {
    background: rgba(248, 113, 113, 0.08);
    color: var(--red);
    border: 1px solid rgba(248, 113, 113, 0.2);
  }
  .item-state-badge.queued {
    background: rgba(113, 113, 122, 0.08);
    color: var(--text-dim);
    border: 1px solid rgba(113, 113, 122, 0.2);
  }
  .item-state-badge.awaiting {
    background: rgba(251, 191, 36, 0.08);
    color: var(--yellow);
    border: 1px solid rgba(251, 191, 36, 0.2);
  }

  .item-meta {
    display: flex;
    gap: 1rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .item-meta .meta-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .item-meta .meta-label {
    color: var(--text-dim);
  }
  .item-meta .meta-value {
    font-family: var(--font-mono);
    color: var(--text-muted);
  }
  .item-meta .meta-value.step {
    color: var(--cyan);
  }
  .item-meta .meta-value.phase {
    color: var(--violet);
  }

  .item-pr {
    margin-top: 0.5rem;
    font-size: 0.75rem;
  }
  .item-pr a {
    color: var(--accent);
    text-decoration: none;
    font-family: var(--font-mono);
  }
  .item-pr a:hover {
    text-decoration: underline;
  }

  .item-error {
    margin-top: 0.5rem;
    padding: 0.5rem 0.75rem;
    background: rgba(248, 113, 113, 0.06);
    border: 1px solid rgba(248, 113, 113, 0.15);
    border-radius: 4px;
    font-size: 0.75rem;
    font-family: var(--font-mono);
    color: var(--red);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Log viewer */
  .log-viewer {
    margin-top: 0.75rem;
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 400px;
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    line-height: 1.5;
  }
  .log-viewer .log-line {
    padding: 0.15rem 0.75rem;
    border-bottom: 1px solid rgba(42, 42, 46, 0.4);
    display: flex;
    align-items: baseline;
    gap: 0;
  }
  .log-viewer .log-line:last-child {
    border-bottom: none;
  }
  .log-viewer .log-line.tool .tool-arrow {
    color: var(--accent);
    margin-right: 0.45rem;
    flex-shrink: 0;
  }
  .log-viewer .log-line.tool .tool-name {
    color: var(--cyan);
    font-weight: 500;
    margin-right: 0.5rem;
    flex-shrink: 0;
  }
  .log-viewer .log-line.tool .tool-arg {
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1 1 auto;
    min-width: 0;
  }
  .log-viewer .log-line.text {
    color: var(--text-muted);
    padding-left: 1.5rem;
  }
  .log-loading {
    padding: 1rem;
    color: var(--text-dim);
    text-align: center;
    font-size: 0.75rem;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
  }
  .empty-state h2 {
    font-family: var(--font-display);
    font-size: 1.25rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .empty-state p {
    font-size: 0.875rem;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.5;
  }
  .empty-state code {
    font-family: var(--font-mono);
    background: var(--bg-card);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-size: 0.8rem;
    color: var(--accent);
  }

  /* Spend indicator */
  .spend-bar {
    display: flex;
    gap: 0.75rem;
    font-size: 0.7rem;
    font-family: var(--font-mono);
    color: var(--text-dim);
    margin-top: 0.4rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Pulse animation for active items */
  @keyframes pulse-border {
    0%, 100% { border-left-color: var(--accent); }
    50% { border-left-color: var(--accent-dim); }
  }
  .work-item.state-active.phase-async_pending {
    animation: pulse-border 2s ease-in-out infinite;
  }

  /* Control buttons */
  .control-buttons {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .ctrl-btn {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 0.25rem 0.65rem;
    border-radius: 4px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .ctrl-btn:active { transform: scale(0.97); }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ctrl-btn.stop {
    background: rgba(248, 113, 113, 0.1);
    border-color: rgba(248, 113, 113, 0.3);
    color: var(--red);
  }
  .ctrl-btn.stop:hover:not(:disabled) {
    background: rgba(248, 113, 113, 0.2);
  }
  .ctrl-btn.retry {
    background: rgba(251, 191, 36, 0.1);
    border-color: rgba(251, 191, 36, 0.3);
    color: var(--yellow);
  }
  .ctrl-btn.retry:hover:not(:disabled) {
    background: rgba(251, 191, 36, 0.2);
  }
  .ctrl-btn.message {
    background: rgba(34, 211, 238, 0.1);
    border-color: rgba(34, 211, 238, 0.3);
    color: var(--cyan);
  }
  .ctrl-btn.message:hover:not(:disabled) {
    background: rgba(34, 211, 238, 0.2);
  }
  .ctrl-btn.send {
    background: rgba(34, 211, 238, 0.1);
    border-color: rgba(34, 211, 238, 0.3);
    color: var(--cyan);
  }
  .ctrl-btn.send:hover:not(:disabled) {
    background: rgba(34, 211, 238, 0.2);
  }
  .ctrl-btn.cancel {
    background: rgba(113, 113, 122, 0.1);
    border-color: rgba(113, 113, 122, 0.2);
    color: var(--text-dim);
  }
  .ctrl-btn.cancel:hover:not(:disabled) {
    background: rgba(113, 113, 122, 0.2);
  }
  .ctrl-btn.issue {
    background: rgba(167, 139, 250, 0.1);
    border-color: rgba(167, 139, 250, 0.3);
    color: var(--violet);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }
  .ctrl-btn.issue:hover,
  .ctrl-btn.issue:focus {
    background: rgba(167, 139, 250, 0.2);
    text-decoration: none;
  }
  .ctrl-flash {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    animation: fade-out 2s forwards;
  }
  .ctrl-flash.ok { color: var(--green); }
  .ctrl-flash.err { color: var(--red); }
  @keyframes fade-out {
    0%, 60% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Send-message panel */
  .message-panel {
    margin-top: 0.5rem;
    display: flex;
    gap: 0.5rem;
    align-items: flex-start;
  }
  .message-panel textarea {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 0.4rem 0.6rem;
    resize: vertical;
    min-height: 60px;
    outline: none;
  }
  .message-panel textarea:focus {
    border-color: var(--cyan);
  }
  .message-panel-actions {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1><span>erg</span> orchestrator dashboard</h1>
  </div>
  <div class="header-right">
    <span class="auth-info" id="authInfo"></span>
    <div class="connection-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">connecting</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="summary-bar" id="summaryBar"></div>
  <div id="content"></div>
</div>

<script>
(function() {
  'use strict';

  let state = null;
  let expandedItems = new Set();
  let messagePanelOpen = new Set(); // item IDs with message panel open
  let logCache = {};
  let es = null;
  let controlEnabled = false; // set after capabilities fetch

  const SCROLL_THRESHOLD = 50; // px from bottom to consider "at bottom"

  function isAtBottom(el) {
    return el.scrollHeight - el.scrollTop - el.clientHeight <= SCROLL_THRESHOLD;
  }

  function logPlaceholder(message) {
    return `<div class="log-viewer"><div class="log-loading">${escapeHtml(message)}</div></div>`;
  }

  function connect() {
    if (es) es.close();
    es = new EventSource('/api/events');
    es.onopen = () => setConnected(true);
    es.onmessage = (e) => {
      try {
        state = JSON.parse(e.data);
        render();
      } catch(err) {
        console.error('parse error:', err);
      }
    };
    es.onerror = () => {
      setConnected(false);
      es.close();
      setTimeout(connect, 3000);
    };
  }

  function setConnected(ok) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    dot.className = 'status-dot' + (ok ? '' : ' disconnected');
    txt.textContent = ok ? 'connected' : 'reconnecting...';
  }

  function formatAge(ts) {
    if (!ts) return '\u2014';
    const d = (Date.now() - new Date(ts).getTime()) / 1000;
    if (d < 60) return Math.floor(d) + 's';
    if (d < 3600) return Math.floor(d / 60) + 'm';
    if (d < 86400) return Math.floor(d / 3600) + 'h';
    return Math.floor(d / 86400) + 'd';
  }

  function formatCost(v) {
    if (v === 0) return '$0.00';
    if (v < 0.01) return '$' + v.toFixed(4);
    return '$' + v.toFixed(2);
  }

  function formatTokens(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return '' + n;
  }

  function formatUptime(secs) {
    if (secs < 60) return secs + 's';
    if (secs < 3600) return Math.floor(secs / 60) + 'm';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    return h + 'h ' + m + 'm';
  }

  function issueLabel(item) {
    const ref = item.issue_ref;
    if (!ref || !ref.source) return item.id;
    if (ref.source === 'github') {
      return '#' + ref.id + (ref.title ? ' ' + ref.title : '');
    }
    return ref.id + (ref.title ? ' ' + ref.title : '');
  }

  function repoDisplayName(repo) {
    // Handle comma-separated multi-repo strings
    if (repo.includes(', ')) {
      return repo.split(', ').map(repoDisplayName).join(', ');
    }
    // Show last two path segments or full owner/repo
    if (repo.includes('/')) {
      const parts = repo.split('/');
      if (parts.length >= 2) return parts.slice(-2).join('/');
    }
    return repo;
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function render() {
    if (!state) return;
    renderSummary();
    renderDaemons();
  }

  function isAwaiting(item) {
    return (
      item.state === 'active' &&
      item.current_step &&
      /(^|_)await_/.test(item.current_step)
    );
  }

  function renderSummary() {
    const bar = document.getElementById('summaryBar');
    let totalActive = 0, totalAwaiting = 0, totalQueued = 0, totalCompleted = 0, totalFailed = 0;
    let totalCost = 0, totalTokens = 0;

    for (const d of state.daemons) {
      totalCost += d.cost_usd;
      totalTokens += d.input_tokens + d.output_tokens;
      for (const w of d.work_items) {
        switch (w.state) {
          case 'active':
            totalActive++;
            if (isAwaiting(w)) totalAwaiting++;
            break;
          case 'queued': totalQueued++; break;
          case 'completed': totalCompleted++; break;
          case 'failed': totalFailed++; break;
        }
      }
    }

    const summaryHtml = `
      <div class="summary-stat">
        <div class="label">Orchestrators</div>
        <div class="value accent">${state.daemons.length}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Active</div>
        <div class="value green">${totalActive}</div>
      </div>
      ${totalAwaiting > 0 ? `<div class="summary-stat">
        <div class="label">Awaiting</div>
        <div class="value yellow">${totalAwaiting}</div>
      </div>` : ''}
      <div class="summary-stat">
        <div class="label">Queued</div>
        <div class="value">${totalQueued}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Completed</div>
        <div class="value cyan">${totalCompleted}</div>
      </div>
      ${totalFailed > 0 ? `<div class="summary-stat">
        <div class="label">Failed</div>
        <div class="value red">${totalFailed}</div>
      </div>` : ''}
      <div class="summary-stat">
        <div class="label">Spend</div>
        <div class="value">${formatCost(totalCost)}</div>
      </div>
      <div class="summary-stat">
        <div class="label">Tokens</div>
        <div class="value">${formatTokens(totalTokens)}</div>
      </div>
    `;
    bar.innerHTML = summaryHtml;
  }

  function renderDaemons() {
    const content = document.getElementById('content');

    if (state.daemons.length === 0) {
      content.innerHTML = `
        <div class="empty-state">
          <h2>No running orchestrators</h2>
          <p>Start an orchestrator with <code>erg start</code> to see your workers here.</p>
        </div>
      `;
      return;
    }

    let html = '';
    for (const daemon of state.daemons) {
      html += renderDaemon(daemon);
    }

    Idiomorph.morph(content, html, {
      morphStyle: 'innerHTML',
      ignoreActiveValue: true,
      callbacks: {
        beforeNodeMorphed(oldNode, newNode) {
          // Preserve log-container children — they are populated dynamically
          // and the new HTML always has empty containers.
          if (oldNode.classList && oldNode.classList.contains('log-container')) {
            const oldSession = oldNode.dataset.session;
            const newSession = newNode.dataset?.session;
            // If session changed (e.g. retry), allow morph to clear old logs
            if (oldSession && oldSession !== newSession) {
              delete logCache[oldSession];
              return true;
            }
            // Update data attributes but keep children (log-viewer) intact
            if (newNode.dataset) {
              oldNode.dataset.id = newNode.dataset.id || '';
              oldNode.dataset.session = newNode.dataset.session || '';
            }
            return false;
          }
          return true;
        },
      },
    });

    // Populate any empty log containers (newly expanded items)
    content.querySelectorAll('.log-container[data-id]').forEach(container => {
      if (container.querySelector('.log-viewer')) return; // already has content
      const sid = container.dataset.session;
      if (sid && logCache[sid]) {
        updateLogViewer(container, 0, logCache[sid]);
      } else if (sid) {
        container.innerHTML = logPlaceholder('Loading logs...');
      } else {
        container.innerHTML = logPlaceholder('No session yet');
      }
    });
  }

  function renderDaemon(daemon) {
    const name = repoDisplayName(daemon.repo);
    const uptime = formatUptime(daemon.uptime_seconds);

    // Sort work items: active first, then queued, then completed, then failed
    const order = { active: 0, queued: 1, completed: 2, failed: 3 };
    const sorted = [...daemon.work_items].sort((a, b) => {
      const oa = order[a.state] ?? 9;
      const ob = order[b.state] ?? 9;
      if (oa !== ob) return oa - ob;
      return new Date(b.updated_at) - new Date(a.updated_at);
    });

    const needsAttention = sorted.filter(item => isAwaiting(item));
    const regular = sorted.filter(item => !isAwaiting(item));

    let attentionHtml = '';
    if (needsAttention.length > 0) {
      let attentionItemsHtml = '';
      for (const item of needsAttention) {
        attentionItemsHtml += renderWorkItem(item, daemon.repo);
      }
      attentionHtml = `
        <div class="needs-attention-section" id="attention-${daemon.pid}">
          <div class="needs-attention-header">&#9888; Needs Attention</div>
          <div class="work-items">${attentionItemsHtml}</div>
        </div>
      `;
    }

    let itemsHtml = '';
    for (const item of regular) {
      itemsHtml += renderWorkItem(item, daemon.repo);
    }

    if (sorted.length === 0) {
      itemsHtml = '<div style="color:var(--text-dim);font-size:0.8rem;padding:0.5rem 0">No work items</div>';
    }

    return `
      <div class="daemon-section" id="daemon-${daemon.pid}">
        <div class="daemon-header">
          <h2>${escapeHtml(name)}</h2>
          <div class="daemon-meta">
            <span>PID ${daemon.pid}</span>
            <span>up ${uptime}</span>
            <span>slots ${daemon.slot_count}</span>
            <span>${formatCost(daemon.cost_usd)}</span>
          </div>
        </div>
        ${attentionHtml}
        ${regular.length > 0 ? `<div class="work-items">${itemsHtml}</div>` : (sorted.length === 0 ? `<div style="color:var(--text-dim);font-size:0.8rem;padding:0.5rem 0">No work items</div>` : '')}
      </div>
    `;
  }

  function renderWorkItem(item, repo) {
    const isExpanded = expandedItems.has(item.id);
    const msgOpen = messagePanelOpen.has(item.id);
    const label = issueLabel(item);
    const phase = item.phase || 'idle';
    const step = item.current_step || '\u2014';
    const stepLabel = item.step_display_name || step;
    const phaseLabel = item.phase_label || phase;
    // Prefer the per-item repo label (e.g. "zhubert/erg") over the daemon-level label.
    const itemRepo = item.repo || repo;
    const age = formatAge(item.step_entered_at);
    const awaiting = isAwaiting(item);

    let titleHtml = escapeHtml(label);
    if (item.pr_url) {
      // Make the title clickable to the PR
      titleHtml = `<a href="${escapeHtml(item.pr_url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a>`;
    }

    let extraHtml = '';

    if (item.pr_url) {
      const prNum = item.pr_url.split('/').pop();
      extraHtml += `<div class="item-pr"><a href="${escapeHtml(item.pr_url)}" target="_blank" rel="noopener">PR #${escapeHtml(prNum)}</a></div>`;
    }

    const issueUrl = item.issue_ref && item.issue_ref.url;
    if (issueUrl && /^https?:\/\//i.test(issueUrl)) {
      extraHtml += `<div class="item-pr"><a class="ctrl-btn issue" href="${escapeHtml(issueUrl)}" target="_blank" rel="noopener">Open Issue</a></div>`;
    }

    if (item.error_message) {
      extraHtml += `<div class="item-error">${escapeHtml(item.error_message)}</div>`;
    }

    // Control buttons (only shown when dashboard has control access)
    let ctrlHtml = '';
    if (controlEnabled) {
      const id = escapeHtml(item.id);
      const isActive = item.state === 'active';
      const isFailed = item.state === 'failed';
      const hasSession = !!item.session_id;

      let buttons = '';
      if (isActive) {
        buttons += `<button class="ctrl-btn stop" data-ctrl-stop="${id}">Stop</button>`;
      }
      if (isFailed) {
        buttons += `<button class="ctrl-btn retry" data-ctrl-retry="${id}">Retry</button>`;
      }
      if (isActive && hasSession && !msgOpen) {
        buttons += `<button class="ctrl-btn message" data-ctrl-open="${id}">Send Message</button>`;
      }

      // Flash placeholders for result feedback
      const flashIds = [];
      if (isActive) flashIds.push('stop');
      if (isFailed) flashIds.push('retry');
      if (isActive && hasSession) flashIds.push('message');
      const encodedId = encodeURIComponent(item.id);
      const flashHtml = flashIds.map(a => `<span class="ctrl-flash" id="flash-${encodedId}-${a}"></span>`).join('');

      if (buttons || msgOpen) {
        ctrlHtml = `<div class="control-buttons">${buttons}${flashHtml}</div>`;
      }

      if (msgOpen) {
        ctrlHtml += `
          <div class="message-panel">
            <textarea id="msg-ta-${encodedId}" placeholder="Message to inject into the running session…" rows="3"></textarea>
            <div class="message-panel-actions">
              <button class="ctrl-btn send" data-ctrl-send="${id}">Send</button>
              <button class="ctrl-btn cancel" data-ctrl-cancel="${id}">Cancel</button>
            </div>
          </div>`;
      }
    }

    // Use a log-container placeholder; the actual log-viewer element is preserved
    // across re-renders by detach/re-attach in renderDaemons().
    let logHtml = '';
    if (isExpanded) {
      logHtml = `<div class="log-container" id="log-${escapeHtml(item.id)}" data-id="${escapeHtml(item.id)}" data-session="${escapeHtml(item.session_id || '')}"></div>`;
    }

    const stateClass = awaiting ? 'awaiting' : item.state;
    const badgeLabel = awaiting ? 'awaiting' : item.state;

    return `
      <div class="work-item state-${stateClass} phase-${phase} ${isExpanded ? 'expanded' : ''}"
           id="wi-${escapeHtml(item.id)}" data-id="${escapeHtml(item.id)}" data-session="${escapeHtml(item.session_id || '')}">
        <div class="item-top">
          <div class="item-title">${titleHtml}</div>
          <span class="item-state-badge ${stateClass}">${badgeLabel}</span>
        </div>
        <div class="item-meta">
          ${itemRepo ? `<div class="meta-item">
            <span class="meta-label">repo</span>
            <span class="meta-value">${escapeHtml(repoDisplayName(itemRepo))}</span>
          </div>` : ''}
          <div class="meta-item">
            <span class="meta-label">step</span>
            <span class="meta-value step" title="${escapeHtml(step)}">${escapeHtml(stepLabel)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">phase</span>
            <span class="meta-value phase" title="${escapeHtml(phase)}">${escapeHtml(phaseLabel)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">age</span>
            <span class="meta-value">${age}</span>
          </div>
          ${item.cost_usd > 0 ? `<div class="meta-item">
            <span class="meta-label">cost</span>
            <span class="meta-value">${formatCost(item.cost_usd)}</span>
          </div>` : ''}
          ${item.feedback_rounds > 0 ? `<div class="meta-item">
            <span class="meta-label">feedback</span>
            <span class="meta-value">${item.feedback_rounds} rounds</span>
          </div>` : ''}
        </div>
        ${extraHtml}
        ${ctrlHtml}
        ${logHtml}
      </div>
    `;
  }

  function renderLogLine(line) {
    if (line.type === 'tool') {
      const nameHtml = line.name ? `<span class="tool-name">${escapeHtml(line.name)}</span>` : '';
      const argHtml = line.text ? `<span class="tool-arg">${escapeHtml(line.text)}</span>` : '';
      return `<div class="log-line tool"><span class="tool-arrow">&#9658;</span>${nameHtml}${argHtml}</div>`;
    }
    return `<div class="log-line text">${escapeHtml(line.text)}</div>`;
  }

  // Update a log viewer in-place, appending only new lines.
  // Creates the log-viewer element inside the container if it doesn't exist yet.
  // Derives "previously rendered count" from logCache to avoid redundant state.
  function updateLogViewer(container, prevCacheLen, lines) {
    let lv = container.querySelector('.log-viewer');
    const isPlaceholder = lv && lv.querySelector('.log-loading');

    if (!lines || lines.length === 0) {
      if (!lv || isPlaceholder) {
        container.innerHTML = logPlaceholder('No output yet');
      }
      return;
    }

    // If no existing viewer, placeholder, or line count decreased (log rotation), do a full render
    if (!lv || isPlaceholder || lines.length < prevCacheLen) {
      let html = '<div class="log-viewer">';
      for (const line of lines) {
        html += renderLogLine(line);
      }
      html += '</div>';
      container.innerHTML = html;
      lv = container.querySelector('.log-viewer');
      lv.scrollTop = lv.scrollHeight;
      return;
    }

    if (lines.length <= prevCacheLen) return; // no new lines

    const wasAtBottom = isAtBottom(lv);

    // Append only new lines
    let fragment = '';
    for (const line of lines.slice(prevCacheLen)) {
      fragment += renderLogLine(line);
    }
    lv.insertAdjacentHTML('beforeend', fragment);

    if (wasAtBottom) {
      lv.scrollTop = lv.scrollHeight;
    }
  }

  async function loadLogs(sessionID, itemID) {
    try {
      const resp = await fetch(`/api/logs/${encodeURIComponent(sessionID)}?tail=200`);
      if (resp.ok) {
        const lines = await resp.json();
        const prevLen = logCache[sessionID]?.length || 0;
        logCache[sessionID] = lines;
        // Update the log viewer in-place instead of re-rendering everything
        const container = document.querySelector(`.log-container[data-id="${CSS.escape(itemID)}"]`);
        if (container) {
          updateLogViewer(container, prevLen, lines);
        }
      }
    } catch(e) {
      console.error('Failed to load logs:', e);
    }
  }

  // Periodically refresh logs for expanded items
  setInterval(() => {
    for (const id of expandedItems) {
      const el = document.querySelector(`.work-item[data-id="${CSS.escape(id)}"]`);
      if (el && el.dataset.session) {
        loadLogs(el.dataset.session, id);
      }
    }
  }, 3000);

  // Fetch auth info and display account email/subscription in the header.
  async function fetchAuthInfo() {
    try {
      const resp = await fetch('/api/auth');
      if (!resp.ok) return;
      const info = await resp.json();
      const el = document.getElementById('authInfo');
      if (!el) return;
      if (info && info.email) {
        const sub = info.subscription ? ' (' + info.subscription + ')' : '';
        el.textContent = info.email + sub;
      } else {
        el.textContent = '';
      }
    } catch(e) {
      // Silently ignore — auth info is best-effort
    }
  }

  // Refresh auth info every 5 minutes
  setInterval(fetchAuthInfo, 5 * 60 * 1000);

  // Fetch capabilities to determine whether control buttons are available.
  async function fetchCapabilities() {
    try {
      const resp = await fetch('/api/capabilities');
      if (resp.ok) {
        const caps = await resp.json();
        controlEnabled = !!caps.control;
      }
    } catch(e) {
      controlEnabled = false;
    }
  }

  // Control actions

  async function stopItem(itemID) {
    const btn = document.querySelector(`[data-ctrl-stop="${CSS.escape(itemID)}"]`);
    if (btn) btn.disabled = true;
    try {
      const resp = await fetch(`/api/workitems/${encodeURIComponent(itemID)}/stop`, {method: 'POST'});
      flashResult(itemID, 'stop', resp.ok, resp.ok ? 'stopped' : await resp.text());
    } catch(e) {
      flashResult(itemID, 'stop', false, 'request failed');
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  async function retryItem(itemID) {
    const btn = document.querySelector(`[data-ctrl-retry="${CSS.escape(itemID)}"]`);
    if (btn) btn.disabled = true;
    try {
      const resp = await fetch(`/api/workitems/${encodeURIComponent(itemID)}/retry`, {method: 'POST'});
      flashResult(itemID, 'retry', resp.ok, resp.ok ? 'queued' : await resp.text());
    } catch(e) {
      flashResult(itemID, 'retry', false, 'request failed');
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  function openMessagePanel(itemID) {
    messagePanelOpen.add(itemID);
    render();
    const ta = document.getElementById(`msg-ta-${encodeURIComponent(itemID)}`);
    if (ta) ta.focus();
  }

  function closeMessagePanel(itemID) {
    messagePanelOpen.delete(itemID);
    render();
  }

  async function sendMessage(itemID) {
    const ta = document.getElementById(`msg-ta-${encodeURIComponent(itemID)}`);
    if (!ta) return;
    const msg = ta.value.trim();
    if (!msg) return;
    const btn = document.querySelector(`[data-ctrl-send="${CSS.escape(itemID)}"]`);
    if (btn) btn.disabled = true;
    try {
      const resp = await fetch(`/api/workitems/${encodeURIComponent(itemID)}/message`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg}),
      });
      if (resp.ok) {
        messagePanelOpen.delete(itemID);
        flashResult(itemID, 'message', true, 'sent');
        render();
      } else {
        flashResult(itemID, 'message', false, await resp.text());
      }
    } catch(e) {
      flashResult(itemID, 'message', false, 'request failed');
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  function flashResult(itemID, action, ok, text) {
    const el = document.getElementById(`flash-${encodeURIComponent(itemID)}-${action}`);
    if (!el) return;
    el.textContent = ok ? ('✓ ' + text) : ('✗ ' + text.slice(0, 60));
    el.className = 'ctrl-flash ' + (ok ? 'ok' : 'err');
    // Remove and re-add to restart animation
    el.style.animation = 'none';
    requestAnimationFrame(() => { el.style.animation = ''; });
  }

  // Event delegation — single handler survives morphing
  document.getElementById('content').addEventListener('click', (e) => {
    // Control buttons
    const stopBtn = e.target.closest('[data-ctrl-stop]');
    if (stopBtn) { e.stopPropagation(); stopItem(stopBtn.dataset.ctrlStop); return; }

    const retryBtn = e.target.closest('[data-ctrl-retry]');
    if (retryBtn) { e.stopPropagation(); retryItem(retryBtn.dataset.ctrlRetry); return; }

    const openBtn = e.target.closest('[data-ctrl-open]');
    if (openBtn) { e.stopPropagation(); openMessagePanel(openBtn.dataset.ctrlOpen); return; }

    const sendBtn = e.target.closest('[data-ctrl-send]');
    if (sendBtn) { e.stopPropagation(); sendMessage(sendBtn.dataset.ctrlSend); return; }

    const cancelBtn = e.target.closest('[data-ctrl-cancel]');
    if (cancelBtn) { e.stopPropagation(); closeMessagePanel(cancelBtn.dataset.ctrlCancel); return; }

    // Work item expand/collapse
    if (e.target.tagName === 'A') return;
    if (e.target.closest('.control-buttons, .message-panel')) return;
    const item = e.target.closest('.work-item[data-id]');
    if (!item) return;
    const id = item.dataset.id;
    const sid = item.dataset.session;
    if (expandedItems.has(id)) {
      expandedItems.delete(id);
      if (sid) delete logCache[sid];
    } else {
      expandedItems.add(id);
      if (sid) loadLogs(sid, id);
    }
    render();
  });

  // Start
  fetchCapabilities();
  fetchAuthInfo();
  connect();
})();
</script>
</body>
</html>
