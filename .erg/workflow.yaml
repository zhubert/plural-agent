workflow: plan-then-code
start: plan

source:
  provider: github
  filter:
    label: plan

states:
  plan:
    type: template
    use: builtin:plan
    exits:
      success: code
      failure: notify_failed

  code:
    type: template
    use: builtin:code
    params:
      simplify: true
    exits:
      success: pr
      failure: notify_failed

  pr:
    type: template
    use: builtin:pr
    exits:
      success: ci
      failure: notify_failed

  ci:
    type: template
    use: builtin:ci
    params:
      simplify: true
    exits:
      success: review
      failure: notify_failed

  review:
    type: template
    use: builtin:review
    params:
      simplify: true
    exits:
      success: done
      failure: notify_failed

  notify_failed:
    type: task
    action: github.comment_issue
    params:
      body: "Task failed. Manual intervention required."
    next: failed
    error: failed

  done:
    type: succeed

  failed:
    type: fail
