version: 2

project_name: erg

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: zhubert
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/zhubert/erg"
    description: "Autonomous headless daemon for Claude Code"
    license: "MIT"
    dependencies:
      - name: git
      - name: docker
        type: recommended
    install: |
      bin.install "erg"
      (var/"erg").mkpath
      (var/"log/erg").mkpath
    service: |
      run [opt_bin/"erg", "start", "-f"]
      keep_alive true
      environment_variables PATH: "#{Dir.home}/.local/bin:#{std_service_path_env}",
                              XDG_CONFIG_HOME: "#{Dir.home}/.config",
                              XDG_DATA_HOME: "#{Dir.home}/.local/share",
                              XDG_STATE_HOME: "#{Dir.home}/.local/state"
      working_dir var/"erg"
      log_path var/"log/erg/daemon.log"
      error_log_path var/"log/erg/daemon.err.log"
